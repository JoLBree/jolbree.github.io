<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
	<title>Marsh</title>
	<style type="text/css">
		input[type=checkbox] {
			transform: scale(2);
			transform-origin: bottom;
		}
		input[type=text] {
			transform: scale(1.5);
			transform-origin: bottom left;
			margin-left: 10px;
		}
		label {
		  margin-left: 10px;
		  font-size: 2em;
		}
	</style>
</head>
<body>
	<div>
		 <img src="https://img.rankedboost.com/wp-content/plugins/pokemon-diamond-pearl/assets/location/Great%20Marsh.png" alt="Map of the Great Marsh"> 
	</div>
	<div>
		<div><input type="checkbox" id="area-1" name="area-1"><label for="area-1">Area 1</label><input type="text" name="area-1"></div>
		<div><input type="checkbox" id="area-2" name="area-2"><label for="area-2">Area 2</label><input type="text" name="area-2"></div>
		<div><input type="checkbox" id="area-3" name="area-3"><label for="area-3">Area 3</label><input type="text" name="area-3"></div>
		<div><input type="checkbox" id="area-4" name="area-4"><label for="area-4">Area 4</label><input type="text" name="area-4"></div>
		<div><input type="checkbox" id="area-5" name="area-5"><label for="area-5">Area 5</label><input type="text" name="area-5"></div>
		<div><input type="checkbox" id="area-6" name="area-6"><label for="area-6">Area 6</label><input type="text" name="area-6"></div>
	</div>
	<div style="margin-top: 10px;">
		<div>Golduck, Roselia, Staravia, Skorupi, Drapion, Croagunk, Toxicroak, Carnivine</div>
		<div>Paras, Exeggcute, Kangaskhan, Yanma, Shroomish, Gulpin</div>
	</div>
</body>
</html>
